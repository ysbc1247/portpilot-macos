name: DevBerth
options:
  minimumXcodeGenVersion: 2.46.0
  deploymentTarget:
    macOS: "14.0"
  createIntermediateGroups: true
settings:
  base:
    SWIFT_VERSION: "5.0"
    MACOSX_DEPLOYMENT_TARGET: 14.0
    DEVELOPMENT_TEAM: ""
    CODE_SIGN_STYLE: Automatic
    ENABLE_USER_SCRIPT_SANDBOXING: YES
    GCC_TREAT_WARNINGS_AS_ERRORS: YES
    SWIFT_TREAT_WARNINGS_AS_ERRORS: YES
    CLANG_ANALYZER_LOCALIZABILITY_NONLOCALIZED: YES
    MARKETING_VERSION: 0.1.0
    CURRENT_PROJECT_VERSION: 1
configs:
  Debug: debug
  Release: release
targets:
  DevBerth:
    type: application
    platform: macOS
    sources:
      - path: DevBerth
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.ysbc.devberth
        PRODUCT_NAME: DevBerth
        GENERATE_INFOPLIST_FILE: YES
        INFOPLIST_KEY_CFBundleDisplayName: DevBerth
        INFOPLIST_KEY_LSApplicationCategoryType: public.app-category.developer-tools
        INFOPLIST_KEY_LSMinimumSystemVersion: "14.0"
        INFOPLIST_KEY_NSHumanReadableCopyright: Copyright © 2026 DevBerth contributors.
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        CODE_SIGN_ENTITLEMENTS: DevBerth/Resources/DevBerth.entitlements
        ENABLE_APP_SANDBOX: NO
        ENABLE_HARDENED_RUNTIME: YES
  DevBerthTests:
    type: bundle.unit-test
    platform: macOS
    sources:
      - path: DevBerthTests
    dependencies:
      - target: DevBerth
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.ysbc.devberth.tests
        GENERATE_INFOPLIST_FILE: YES
  DevBerthIntegrationTests:
    type: bundle.unit-test
    platform: macOS
    sources:
      - path: DevBerthIntegrationTests
      - path: Fixtures
        buildPhase: resources
    dependencies:
      - target: DevBerth
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.ysbc.devberth.integration-tests
        GENERATE_INFOPLIST_FILE: YES
schemes:
  DevBerth:
    build:
      targets:
        DevBerth: all
        DevBerthTests: [test]
        DevBerthIntegrationTests: [test]
    test:
      gatherCoverageData: true
      targets:
        - name: DevBerthTests
          parallelizable: true
          randomExecutionOrder: true
        - name: DevBerthIntegrationTests
          parallelizable: false
    run:
      config: Debug
    archive:
      config: Release
