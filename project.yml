name: PortPilot
options:
  minimumXcodeGenVersion: 2.46.0
  deploymentTarget:
    macOS: "14.0"
  createIntermediateGroups: true
settings:
  base:
    SWIFT_VERSION: 5.10
    MACOSX_DEPLOYMENT_TARGET: 14.0
    DEVELOPMENT_TEAM: ""
    CODE_SIGN_STYLE: Automatic
    ENABLE_USER_SCRIPT_SANDBOXING: YES
    GCC_TREAT_WARNINGS_AS_ERRORS: YES
    SWIFT_TREAT_WARNINGS_AS_ERRORS: YES
    CLANG_ANALYZER_LOCALIZABILITY_NONLOCALIZED: YES
configs:
  Debug: debug
  Release: release
targets:
  PortPilot:
    type: application
    platform: macOS
    sources:
      - path: PortPilot
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.ysbc.portpilot
        PRODUCT_NAME: PortPilot
        GENERATE_INFOPLIST_FILE: YES
        INFOPLIST_KEY_CFBundleDisplayName: PortPilot
        INFOPLIST_KEY_LSApplicationCategoryType: public.app-category.developer-tools
        INFOPLIST_KEY_LSMinimumSystemVersion: "14.0"
        INFOPLIST_KEY_NSHumanReadableCopyright: Copyright © 2026 PortPilot contributors.
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        CODE_SIGN_ENTITLEMENTS: PortPilot/Resources/PortPilot.entitlements
        ENABLE_APP_SANDBOX: NO
        ENABLE_HARDENED_RUNTIME: YES
  PortPilotTests:
    type: bundle.unit-test
    platform: macOS
    sources:
      - path: PortPilotTests
    dependencies:
      - target: PortPilot
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.ysbc.portpilot.tests
        GENERATE_INFOPLIST_FILE: YES
  PortPilotIntegrationTests:
    type: bundle.unit-test
    platform: macOS
    sources:
      - path: PortPilotIntegrationTests
    dependencies:
      - target: PortPilot
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.ysbc.portpilot.integration-tests
        GENERATE_INFOPLIST_FILE: YES
schemes:
  PortPilot:
    build:
      targets:
        PortPilot: all
        PortPilotTests: [test]
        PortPilotIntegrationTests: [test]
    test:
      gatherCoverageData: true
      targets:
        - name: PortPilotTests
          parallelizable: true
          randomExecutionOrder: true
        - name: PortPilotIntegrationTests
          parallelizable: false
    run:
      config: Debug
    archive:
      config: Release

