name: DevBerth
options:
  minimumXcodeGenVersion: 2.46.0
  deploymentTarget:
    macOS: "14.0"
  createIntermediateGroups: true
settings:
  base:
    SWIFT_VERSION: "5.0"
    MACOSX_DEPLOYMENT_TARGET: 14.0
    DEVELOPMENT_TEAM: ""
    CODE_SIGN_STYLE: Automatic
    ENABLE_USER_SCRIPT_SANDBOXING: YES
    GCC_TREAT_WARNINGS_AS_ERRORS: YES
    SWIFT_TREAT_WARNINGS_AS_ERRORS: YES
    CLANG_ANALYZER_LOCALIZABILITY_NONLOCALIZED: YES
    MARKETING_VERSION: 0.1.0
    CURRENT_PROJECT_VERSION: 1
configs:
  Debug: debug
  Release: release
packages:
  MCP:
    url: https://github.com/modelcontextprotocol/swift-sdk.git
    exactVersion: 0.12.1
targets:
  DevBerthControlContracts:
    type: library.static
    platform: macOS
    sources:
      - path: DevBerthControlContracts
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.ysbc.devberth.control-contracts
        PRODUCT_NAME: DevBerthControlContracts
        # Xcode's generated static-library header copy phase writes through a
        # temporary directory that is not declared to the user-script sandbox.
        ENABLE_USER_SCRIPT_SANDBOXING: NO
  DevBerth:
    type: application
    platform: macOS
    sources:
      - path: DevBerth
      - path: Fixtures
        buildPhase: resources
    dependencies:
      - target: DevBerthControlContracts
      - target: DevBerthMCP
        embed: true
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.ysbc.devberth
        PRODUCT_NAME: DevBerth
        GENERATE_INFOPLIST_FILE: NO
        INFOPLIST_FILE: Configuration/DevBerth-Info.plist
        DEVBERTH_DEVELOPMENT_CONTROL_HOST_ALLOWED: NO
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        CODE_SIGN_ENTITLEMENTS: DevBerth/Resources/DevBerth.entitlements
        ENABLE_APP_SANDBOX: NO
        ENABLE_HARDENED_RUNTIME: YES
      configs:
        Debug:
          DEVBERTH_DEVELOPMENT_CONTROL_HOST_ALLOWED: YES
        Release:
          DEVBERTH_DEVELOPMENT_CONTROL_HOST_ALLOWED: NO
  DevBerthMCP:
    type: tool
    platform: macOS
    sources:
      - path: DevBerthMCP
    dependencies:
      - target: DevBerthControlContracts
      - package: MCP
    settings:
      base:
        PRODUCT_NAME: devberth-mcp
        SWIFT_VERSION: "6.0"
  DevBerthTests:
    type: bundle.unit-test
    platform: macOS
    sources:
      - path: DevBerthTests
    dependencies:
      - target: DevBerth
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.ysbc.devberth.tests
        GENERATE_INFOPLIST_FILE: YES
  DevBerthIntegrationTests:
    type: bundle.unit-test
    platform: macOS
    sources:
      - path: DevBerthIntegrationTests
      - path: Fixtures
        buildPhase: resources
    dependencies:
      - target: DevBerth
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.ysbc.devberth.integration-tests
        GENERATE_INFOPLIST_FILE: YES
  DevBerthMCPTests:
    type: bundle.unit-test
    platform: macOS
    sources:
      - path: DevBerthMCPTests
    dependencies:
      - target: DevBerth
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.ysbc.devberth.mcp-tests
        GENERATE_INFOPLIST_FILE: YES
  DevBerthUITests:
    type: bundle.ui-testing
    platform: macOS
    sources:
      - path: DevBerthUITests
    dependencies:
      - target: DevBerth
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.ysbc.devberth.ui-tests
        GENERATE_INFOPLIST_FILE: YES
schemes:
  DevBerthMCP:
    build:
      targets:
        DevBerthMCP: all
    run:
      config: Debug
    archive:
      config: Release
  DevBerth:
    build:
      targets:
        DevBerth: all
        DevBerthTests: [test]
        DevBerthIntegrationTests: [test]
    test:
      gatherCoverageData: true
      targets:
        - name: DevBerthTests
          parallelizable: true
          randomExecutionOrder: true
        - name: DevBerthIntegrationTests
          parallelizable: false
        - name: DevBerthMCPTests
          parallelizable: false
        - name: DevBerthUITests
          parallelizable: false
    run:
      config: Debug
    archive:
      config: Release
