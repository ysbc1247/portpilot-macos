name: CI

on:
  push:
    branches: [main, phase-2-differentiation]
  pull_request:
  workflow_dispatch:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  build-and-test:
    name: Build and test
    runs-on: macos-15
    timeout-minutes: 20
    env:
      DEVELOPER_DIR: /Applications/Xcode_16.4.app/Contents/Developer
    steps:
      - name: Check out repository
        uses: actions/checkout@v5

      - name: Report toolchain
        run: |
          xcodebuild -version
          swift --version
          python3 --version

      - name: Build application
        run: >-
          xcodebuild
          -project DevBerth.xcodeproj
          -scheme DevBerth
          -configuration Debug
          -destination 'platform=macOS,arch=arm64'
          CODE_SIGNING_ALLOWED=NO
          build

      - name: Compile isolated UI test target
        run: >-
          xcodebuild
          -project DevBerth.xcodeproj
          -scheme DevBerth
          -configuration Debug
          -destination 'platform=macOS,arch=arm64'
          -only-testing:DevBerthUITests
          build-for-testing

      - name: Run unit and safe integration tests
        run: >-
          xcodebuild
          -project DevBerth.xcodeproj
          -scheme DevBerth
          -configuration Debug
          -destination 'platform=macOS,arch=arm64'
          CODE_SIGNING_ALLOWED=NO
          -skip-testing:DevBerthUITests
          -resultBundlePath TestResults.xcresult
          test

      - name: Upload failed test results
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: DevBerth-TestResults
          path: TestResults.xcresult
          retention-days: 7
